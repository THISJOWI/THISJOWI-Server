# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-thisjowi
    environment:
      CASSANDRA_CLUSTER_NAME: "THISJOWI"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_RACK: "rack1"
    ports:
      - "9042:9042"
      - "9160:9160"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-u", "cassandra", "-p", "cassandra", "-e", "describe cluster"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
    container_name: messages-server
    environment:
      NODE_ENV: production
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_DATACENTER: datacenter1
      CASSANDRA_USERNAME: cassandra
      CASSANDRA_PASSWORD: cassandra
      CASSANDRA_KEYSPACE: messaging
      AUTH_SERVICE_URL: http://auth:8082/api/v1/auth
    ports:
      - "8086:8086"
    depends_on:
      cassandra:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cassandra-data:

