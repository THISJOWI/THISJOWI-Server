apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`cd.thisjowi.uk`)
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
  tls: {}
