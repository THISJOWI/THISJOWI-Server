apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: linkerd-viz
  annotations:
    kubernetes.io/ingress.class: traefik
    # El formato es: namespace-nombre@kubernetescrd
    traefik.ingress.kubernetes.io/router.middlewares: linkerd-viz-linkerd-auth@kubernetescrd
    traefik.ingress.kubernetes.io/custom-request-headers: "l5d-dst-override:web.linkerd-viz.svc.cluster.local:8084"
spec:
  ingressClassName: traefik
  rules:
    - host: dash.thisjowi.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8084
