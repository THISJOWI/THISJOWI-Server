apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # Indica a Traefik que el backend es HTTPS
    traefik.ingress.kubernetes.io/service.serverstransport: argocd-argocd-transport@kubernetescrd
    # IMPORTANTE: Indica que el backend usa esquema HTTPS
    traefik.ingress.kubernetes.io/service.scheme: https
spec:
  rules:
  - host: argocd.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443
