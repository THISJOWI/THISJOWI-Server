apiVersion: v1
kind: ConfigMap
metadata:
  name: keydb-config
  namespace: thisjowi
data:
  keydb.conf: |
    # Configuration for THISJOWI (Compatible with Redis)
    port 6379
    bind 0.0.0.0

    # Memory management
    maxmemory 256mb
    maxmemory-policy allkeys-lru

    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec

    # Security
    requirepass ""

    # Logging
    loglevel notice
    logfile ""

    # Database
    databases 16
