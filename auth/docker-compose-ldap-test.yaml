# Docker Compose para servidor LDAP de prueba
# Ejecutar: docker-compose -f docker-compose-ldap-test.yaml up -d
version: '3.8'

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap-test
    environment:
      LDAP_ORGANISATION: "THISJOWI Test"
      LDAP_DOMAIN: "thisjowi.local"
      LDAP_BASE_DN: "dc=thisjowi,dc=local"
      LDAP_ADMIN_PASSWORD: "admin123"
      LDAP_CONFIG_PASSWORD: "config123"
      LDAP_READONLY_USER: "false"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
    networks:
      - ldap-test

  # Interfaz web para administrar LDAP (opcional)
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8088:80"
    depends_on:
      - openldap
    networks:
      - ldap-test

volumes:
  openldap_data:
  openldap_config:

networks:
  ldap-test:
    driver: bridge
