version: 2.1

executors:
  docker-executor:
    docker:
      - image: cimg/base:stable
    resource_class: medium

commands:

  docker-build-push:
    parameters:
      service:
        type: string
      image:
        type: string
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: "Detectar cambios y hacer Build & Push << parameters.service >>"
          command: |
            BASE=$(git rev-parse --verify HEAD~1 2>/dev/null || echo "4b825dc642cb6eb9a060e54bf8d69288fbee4904")
            CHANGED=$(git diff --name-only "$BASE" HEAD | grep "^<< parameters.service >>/" || true)

            # Crear siempre el archivo, con true o false
            mkdir -p /tmp/built
            if [ -z "$CHANGED" ]; then
              echo "Sin cambios en << parameters.service >>, saltando build."
              echo "false" > /tmp/built/<< parameters.service >>
              exit 0
            fi

            echo "Cambios detectados en << parameters.service >>, construyendo imagen..."
            echo "true" > /tmp/built/<< parameters.service >>

            IMAGE_TAG="<< parameters.image >>:${CIRCLE_SHA1}"
            IMAGE_LATEST="<< parameters.image >>:latest"
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build \
              -t "$IMAGE_TAG" \
              -t "$IMAGE_LATEST" \
              ./<< parameters.service >>
            docker push "$IMAGE_TAG"
            docker push "$IMAGE_LATEST"
      - persist_to_workspace:
          root: /tmp/built
          paths:
            - << parameters.service >>

  update-k8s-manifest:
    parameters:
      service:
        type: string
      manifest_path:
        type: string
      image:
        type: string
    steps:
      - run:
          name: "Actualizar tag en << parameters.manifest_path >>"
          command: |
            BUILT=$(cat /tmp/built/<< parameters.service >> 2>/dev/null || echo "false")
            if [ "$BUILT" != "true" ]; then
              echo "Skipping << parameters.service >> — no fue buildeado."
              exit 0
            fi
            sed -i "s|<< parameters.image >>:.*|<< parameters.image >>:${CIRCLE_SHA1}|g" \
              k8s-repo/<< parameters.manifest_path >>
            echo "Tag actualizado: << parameters.image >>:${CIRCLE_SHA1}"

jobs:

  build-auth:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: auth
          image: thsjowi/auth

  build-config:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: config
          image: thsjowi/config

  build-notes:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: note
          image: thsjowi/note

  build-otp:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: otp
          image: thsjowi/otp

  build-password:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: password
          image: thsjowi/password

  build-messages:
    executor: docker-executor
    steps:
      - docker-build-push:
          service: messages
          image: thsjowi/messages

  deploy-argocd:
    executor: docker-executor
    steps:
      - attach_workspace:
          at: /tmp/built
      - run:
          name: Clonar repo de infraestructura
          command: |
            git clone https://${GITHUB_TOKEN}@github.com/THISJOWI/THISJOWI-Infrastructure.git k8s-repo
      - update-k8s-manifest:
          service: auth
          manifest_path: manifests/application/auth/deploy.yaml
          image: thsjowi/auth
      - update-k8s-manifest:
          service: config
          manifest_path: manifests/application/config/deploy.yaml
          image: thsjowi/config
      - update-k8s-manifest:
          service: note
          manifest_path: manifests/application/notes/deploy.yaml
          image: thsjowi/note
      - update-k8s-manifest:
          service: otp
          manifest_path: manifests/application/otp/deploy.yaml
          image: thsjowi/otp
      - update-k8s-manifest:
          service: password
          manifest_path: manifests/application/password/deploy.yaml
          image: thsjowi/password
      - update-k8s-manifest:
          service: messages
          manifest_path: manifests/application/messages/deploy.yaml
          image: thsjowi/messages
      - run:
          name: Commit y push de cambios
          command: |
            cd k8s-repo
            git config user.email "circleci@deploy-bot"
            git config user.name "CircleCI Deploy Bot"
            git add manifests/application/
            git diff --cached --quiet && echo "Nada que commitear." && exit 0
            git commit -m "ci: update images to ${CIRCLE_SHA1} [skip ci]"
            git push origin master

workflows:
  ci-cd:
    jobs:
      - build-auth:
          filters:
            branches:
              only: master
      - build-config:
          filters:
            branches:
              only: master
      - build-notes:
          filters:
            branches:
              only: master
      - build-otp:
          filters:
            branches:
              only: master
      - build-password:
          filters:
            branches:
              only: master
      - build-messages:
          filters:
            branches:
              only: master
      - deploy-argocd:
          requires:
            - build-auth
            - build-config
            - build-notes
            - build-otp
            - build-password
            - build-messages
          filters:
            branches:
              only: master